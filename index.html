<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Trade Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar and animations from your code */
        .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
        :root { --ease-ios: cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes pageEnter { from { opacity: 0; transform: scale(0.99) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes staggerIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
        .animate-page-enter { animation: pageEnter 0.4s var(--ease-ios) forwards; }
        .animate-slide-up-fade { animation: slideUpFade 0.5s var(--ease-ios) backwards; }
        .animate-stagger-in { animation: staggerIn 0.3s var(--ease-ios) forwards; }
        .animate-scale-in { animation: scaleIn 0.4s var(--ease-ios) backwards; }
        .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen overflow-y-auto overflow-x-hidden">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createRoot } from 'react-dom/client';
        
        // --- YOUR CODE STARTS HERE ---
        import React, { useState, useEffect, useMemo } from 'react';
        import { Camera, CheckCircle, XCircle, Home, LayoutDashboard, MapPin, Building, ChevronLeft, Image as ImageIcon, Filter, Check, X, Clock, Search, Loader2, Package, Tags, AlertCircle, Lock, KeyRound, Store, ClipboardCheck, TrendingUp, TrendingDown, Calendar, Maximize2, Download, CalendarDays, Target, User, Calendar as CalendarIcon, Hash, WifiOff } from 'lucide-react';

        // --- APPS SCRIPT URL ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9wMmEGqfi_IPVoyvDIhW0S__SeVqdmPlQTiO3qlBSP63ddbaHkz3EA-Iam0eeP2BBNw/exec';

        // --- PUBLISHED GOOGLE SHEET CSV URLs ---
        const PJP_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYohbwOY-A-afxjnYfiLuHnd6CQ7uqDDJc-Qze5VPkdYbjaJi_7C_8WKC0_u1hm6mxBk-IaUR4PG8w/pub?gid=698262353&single=true&output=csv';
        const SALES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYohbwOY-A-afxjnYfiLuHnd6CQ7uqDDJc-Qze5VPkdYbjaJi_7C_8WKC0_u1hm6mxBk-IaUR4PG8w/pub?gid=0&single=true&output=csv';

        // ULTRA-ROBUST CSV FETCHER (Bypasses Firewalls, CORS, and Adblockers)
        const fetchCSVData = async (url) => {
          // Array of methods to try in order
          const methods = [
            url, // Attempt 1: Direct fetch
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, // Attempt 2: AllOrigins raw
            `https://corsproxy.io/?${encodeURIComponent(url)}`, // Attempt 3: CorsProxy.io
            `https://thingproxy.freeboard.io/fetch/${url}` // Attempt 4: ThingProxy
          ];

          for (let i = 0; i < methods.length; i++) {
            try {
              const res = await fetch(methods[i], { cache: 'no-store' });
              if (res.ok) {
                const text = await res.text();
                // Ensure it's actually CSV data and not a Google HTML error page
                if (!text.trim().startsWith('<')) {
                  return text;
                }
              }
            } catch (e) {
              console.warn(`Fetch method ${i + 1} failed. Trying next...`, e.message);
            }
          }
          throw new Error("Network connection blocked. Please check your internet, VPN, or Adblocker.");
        };

        const compressImage = (file) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
              const img = new Image();
              img.src = event.target.result;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 800; 
                const scaleSize = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scaleSize;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.6)); 
              };
            };
          });
        };

        const getDirectImageUrl = (url) => {
          if (!url) return '';
          if (url.startsWith('data:image') || !url.includes('drive.google.com')) return url;
          const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
          if (match && match[1]) {
            return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
          }
          return url;
        };

        const getLocalTodayString = () => {
          const d = new Date();
          return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // Custom CSV Parser
        const parseCSVLine = (text) => {
          let row = [];
          let inQuotes = false;
          let val = '';
          for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char === '"' && text[i+1] === '"' && inQuotes) {
              val += '"'; i++; 
            } else if (char === '"') {
              inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
              row.push(val); val = '';
            } else {
              val += char;
            }
          }
          row.push(val);
          return row.map(v => v.trim());
        };

        function App() {
          const [view, setView] = useState('selection'); 
          const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [passwordError, setPasswordError] = useState('');
          
          const [outletMaster, setOutletMaster] = useState([]);
          const [isMasterLoading, setIsMasterLoading] = useState(true);
          const [masterError, setMasterError] = useState('');

          // --- FETCH DYNAMIC MASTER DATA (PJP) FROM GOOGLE SHEETS CSV ---
          useEffect(() => {
            const fetchMasterData = async () => {
              try {
                const csvText = await fetchCSVData(PJP_CSV_URL);
                
                const lines = csvText.split(/\r?\n/).filter(line => line.trim().length > 0);
                if (lines.length < 2) {
                    throw new Error("CSV contains no usable data.");
                }

                const parsedData = [];
                for (let i = 1; i < lines.length; i++) {
                  const row = parseCSVLine(lines[i]);
                  if (row[1] && row[1].trim() !== "") { 
                    parsedData.push({
                      accountName: row[0]?.trim() || "",
                      outletCode: row[1]?.trim() || "", 
                      outletName: row[2]?.trim() || "",
                      territoryName: row[3]?.trim() || "",
                      routeName: row[4]?.trim() || "",
                      visitDay: row[5]?.trim() || "",
                      merchandiserName: row[6]?.trim() || ""
                    });
                  }
                }

                parsedData.sort((a, b) => (a.outletName || '').localeCompare(b.outletName || ''));
                setOutletMaster(parsedData);
              } catch (error) {
                console.error("Failed to fetch PJP master data:", error);
                setMasterError(error.message);
              } finally {
                setIsMasterLoading(false);
              }
            };
            fetchMasterData();
          }, []);

          const handleDashboardAccess = () => setIsPasswordModalOpen(true);

          const handlePasswordSubmit = (e) => {
            e.preventDefault();
            if (passwordInput === '1234') {
              setIsPasswordModalOpen(false);
              setPasswordInput('');
              setPasswordError('');
              setView('dashboard');
            } else {
              setPasswordError('Incorrect password.');
            }
          };

          if (isMasterLoading) {
            return (
              <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center font-sans">
                <Loader2 className="h-12 w-12 text-red-600 animate-spin mb-4" />
                <h3 className="text-xl font-bold text-slate-800">Loading Configuration...</h3>
                <p className="text-slate-500 text-sm mt-2">Fetching live PJP data from Google Sheets</p>
              </div>
            );
          }

          if (masterError) {
            return (
              <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 font-sans text-center">
                <div className="bg-red-50 text-red-600 p-4 rounded-full mb-4 shadow-sm border border-red-100">
                  <WifiOff className="h-10 w-10" />
                </div>
                <h3 className="text-xl font-black text-slate-800 mb-2">Connection Failed</h3>
                <p className="text-slate-500 text-sm max-w-sm mb-6">{masterError}</p>
                <button onClick={() => window.location.reload()} className="px-6 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg hover:bg-red-700 transition-all">
                   Retry Connection
                </button>
              </div>
            );
          }

          if (view === 'selection') {
            return (
              <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 relative overflow-hidden font-sans">
                <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-50 rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
                <div className="max-w-sm sm:max-w-md w-full relative z-10">
                  <div className="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 overflow-hidden border border-white">
                    <div className="bg-gradient-to-br from-red-600 to-red-700 px-8 py-10 text-center relative overflow-hidden">
                      <div className="relative z-10">
                        <h1 className="text-3xl font-black text-white tracking-[0.2em] drop-shadow-md leading-none">COLGATE</h1>
                        <p className="text-red-100 font-bold tracking-[0.3em] text-xs mt-2 opacity-90">PALMOLIVE</p>
                      </div>
                    </div>
                    <div className="p-8 bg-white">
                      <div className="text-center mb-8">
                        <h2 className="text-xl font-extrabold text-slate-800">Modern Trade Portal</h2>
                        <p className="text-sm text-slate-500 mt-1 font-medium">Select your operational workspace</p>
                      </div>
                      <div className="space-y-4">
                        <button onClick={() => setView('merchandiser')} className="w-full flex items-center p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-white hover:shadow-xl hover:shadow-red-100 hover:border-red-100 transition-all duration-300 group">
                          <div className="bg-white shadow-sm p-3.5 rounded-xl group-hover:bg-red-50 group-hover:scale-110 transition-all duration-300">
                            <Package className="h-6 w-6 text-red-600" />
                          </div>
                          <div className="ml-4 text-left flex-1">
                            <h3 className="text-[15px] font-bold text-slate-800 group-hover:text-red-700">Field Execution</h3>
                            <p className="text-[11px] text-slate-500">Capture visibility & SOS</p>
                          </div>
                          <ChevronLeft className="h-5 w-5 text-slate-300 rotate-180 group-hover:text-red-500" />
                        </button>
                        <button onClick={handleDashboardAccess} className="w-full flex items-center p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:bg-white hover:shadow-xl hover:shadow-slate-200 hover:border-slate-200 transition-all duration-300 group">
                          <div className="bg-white shadow-sm p-3.5 rounded-xl group-hover:bg-slate-800 group-hover:scale-110 transition-all duration-300">
                            <LayoutDashboard className="h-6 w-6 text-slate-700 group-hover:text-white" />
                          </div>
                          <div className="ml-4 text-left flex-1">
                            <h3 className="text-[15px] font-bold text-slate-800 group-hover:text-slate-900">Audit Desk</h3>
                            <p className="text-[11px] text-slate-500">Review & analyze data</p>
                          </div>
                          <Lock className="h-4 w-4 text-slate-300 group-hover:text-slate-600" />
                        </button>
                      </div>
                    </div>
                  </div>
                  <div className="text-center mt-8">
                    <p className="text-[11px] text-slate-400 font-medium tracking-wide uppercase">© {new Date().getFullYear()} Colgate-Palmolive Company</p>
                  </div>
                </div>

                {isPasswordModalOpen && (
                  <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-3xl max-w-sm w-full p-6 animate-in fade-in zoom-in duration-200">
                      <div className="flex justify-center mb-4">
                        <div className="bg-slate-100 p-4 rounded-full text-slate-700">
                          <Lock className="h-7 w-7" />
                        </div>
                      </div>
                      <h3 className="text-xl font-black text-center text-slate-900 mb-2">Admin Access</h3>
                      <p className="text-sm text-center text-slate-500 mb-6">Enter password to unlock dashboard. (Password: 1234)</p>
                      <form onSubmit={handlePasswordSubmit}>
                        <div className="mb-5">
                          <div className="relative">
                            <KeyRound className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400" />
                            <input type="password" autoFocus className="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="Enter password" value={passwordInput} onChange={(e) => { setPasswordInput(e.target.value); setPasswordError(''); }} />
                          </div>
                          {passwordError && <p className="text-red-500 text-xs mt-2 font-bold ml-1">{passwordError}</p>}
                        </div>
                        <div className="flex gap-3">
                          <button type="button" onClick={() => setIsPasswordModalOpen(false)} className="flex-1 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-xl transition-colors">Cancel</button>
                          <button type="submit" className="flex-1 py-3.5 bg-slate-800 text-white font-bold rounded-xl transition-all">Unlock</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-900">
              <nav className="bg-white shadow-sm border-b border-red-100 px-4 py-3 flex items-center sticky top-0 z-50">
                <div className="flex items-center space-x-3">
                  <button onClick={() => setView('selection')} className="text-gray-500 hover:text-red-600 p-1 rounded-full hover:bg-red-50">
                    <ChevronLeft className="h-6 w-6" />
                  </button>
                  <div className="flex flex-col">
                    <span className="text-[10px] font-bold text-red-600 uppercase tracking-widest leading-none">Colgate-Palmolive</span>
                    <h1 className="text-lg font-bold text-slate-800 leading-tight">
                      {view === 'merchandiser' ? 'MT Outlet Capture' : 'Audit Desk'}
                    </h1>
                  </div>
                </div>
              </nav>
              {view === 'merchandiser' ? <MerchandiserApp outletMaster={outletMaster} /> : <DashboardApp outletMaster={outletMaster} />}
            </div>
          );
        }

        // ==========================================
        // MERCHANDISER APP
        // ==========================================
        function MerchandiserApp({ outletMaster }) {
          const [merchandiser, setMerchandiser] = useState('');
          const [visitDay, setVisitDay] = useState('');
          const [accountName, setAccountName] = useState('');
          const [route, setRoute] = useState('');
          const [outletCode, setOutletCode] = useState('');
          
          const [totalShelf, setTotalShelf] = useState('');
          const [colgateShelf, setColgateShelf] = useState('');
          const [image, setImage] = useState(null);
          const [preview, setPreview] = useState(null);
          const [isUploading, setIsUploading] = useState(false);
          const [isSuccess, setIsSuccess] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');

          const merchandisers = useMemo(() => [...new Set(outletMaster.map(o => o.merchandiserName?.trim()).filter(Boolean))].sort(), [outletMaster]);
          const visitDays = useMemo(() => merchandiser ? [...new Set(outletMaster.filter(o => o.merchandiserName?.trim() === merchandiser).map(o => o.visitDay?.trim()).filter(Boolean))].sort() : [], [merchandiser, outletMaster]);
          const accounts = useMemo(() => visitDay ? [...new Set(outletMaster.filter(o => o.merchandiserName?.trim() === merchandiser && o.visitDay?.trim() === visitDay).map(o => o.accountName?.trim()).filter(Boolean))].sort() : [], [merchandiser, visitDay, outletMaster]);
          const routes = useMemo(() => accountName ? [...new Set(outletMaster.filter(o => o.merchandiserName?.trim() === merchandiser && o.visitDay?.trim() === visitDay && o.accountName?.trim() === accountName).map(o => o.routeName?.trim()).filter(Boolean))].sort() : [], [merchandiser, visitDay, accountName, outletMaster]);
          const outlets = useMemo(() => route ? outletMaster.filter(o => o.merchandiserName?.trim() === merchandiser && o.visitDay?.trim() === visitDay && o.accountName?.trim() === accountName && o.routeName?.trim() === route) : [], [merchandiser, visitDay, accountName, route, outletMaster]);
          
          const selectedOutletDetails = useMemo(() => outletMaster.find(o => String(o.outletCode) === String(outletCode)), [outletCode, outletMaster]);

          const handleImageChange = async (e) => {
            const file = e.target.files[0];
            if (file) {
              setPreview(URL.createObjectURL(file));
              const compressedBase64 = await compressImage(file);
              setImage(compressedBase64);
              setErrorMsg('');
            }
          };

          const clearImage = (e) => {
            e.preventDefault(); 
            setPreview(null);
            setImage(null);
            const fileInput = document.getElementById('camera-input');
            if (fileInput) fileInput.value = '';
          };

          const handleNewEntry = () => {
            setIsSuccess(false);
            setOutletCode('');
            setTotalShelf(''); 
            setColgateShelf('');
            setImage(null); 
            setPreview(null);
            setErrorMsg('');
          };

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (isUploading) return; 
            if (!merchandiser || !visitDay || !accountName || !route || !outletCode || !selectedOutletDetails) { setErrorMsg("Please select complete outlet details."); return; }
            if (totalShelf === '' || colgateShelf === '') { setErrorMsg("Please enter shelf metrics."); return; }
            if (Number(colgateShelf) > Number(totalShelf)) { setErrorMsg("Colgate shelves cannot exceed total shelves."); return; }
            if (!image) { setErrorMsg("Photo is required."); return; }
            
            setIsUploading(true);
            try {
              const payload = {
                userId: 'external_user',
                accountName: selectedOutletDetails.accountName,
                outletCode: String(selectedOutletDetails.outletCode),
                outletName: selectedOutletDetails.outletName,
                territoryName: selectedOutletDetails.territoryName,
                routeName: selectedOutletDetails.routeName,
                visitDay: selectedOutletDetails.visitDay,
                merchandiserName: selectedOutletDetails.merchandiserName,
                totalShelf: Number(totalShelf), 
                colgateShelf: Number(colgateShelf),
                imageUrl: image,
                status: 'Pending Audit', 
                timestamp: Date.now(),
                dateString: new Date().toISOString().split('T')[0]
              };

              await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
              });

              setIsSuccess(true);
            } catch (err) { 
              setErrorMsg("Sync failed: " + err.message); 
            }
            setIsUploading(false);
          };

          return (
            <div className="max-w-md mx-auto bg-white min-h-[calc(100vh-60px)] shadow-xl border-x border-gray-100 pb-8">
              <div className="relative h-44 w-full bg-slate-900 rounded-b-3xl overflow-hidden mb-6 shadow-md">
                <img 
                  src="https://images.unsplash.com/photo-1604719312566-8912e9227c6a?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                  className="w-full h-full object-cover opacity-90" 
                  alt="Modern Trade Supermarket" 
                />
                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                <div className="absolute bottom-5 left-6 right-6">
                  <p className="text-red-400 font-bold text-[10px] uppercase tracking-widest mb-1 flex items-center">
                    <Store className="w-3 h-3 mr-1" /> Field Execution
                  </p>
                  <h2 className="text-2xl font-black text-white tracking-wide">Record Visibility</h2>
                </div>
              </div>

              <div className="px-6">
                {errorMsg && <div className="mb-4 p-4 bg-red-50 text-red-800 rounded-xl font-bold flex items-center"><AlertCircle className="w-5 h-5 mr-2" />{errorMsg}</div>}
                
                {isSuccess ? (
                  <div className="flex flex-col items-center justify-center py-10 text-center animate-in fade-in zoom-in duration-300">
                    <div className="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-6 shadow-sm border border-green-100">
                      <ClipboardCheck className="w-12 h-12" />
                    </div>
                    <h2 className="text-2xl font-black text-slate-800 mb-2">Submit Successful!</h2>
                    <p className="text-sm font-medium text-slate-500 mb-8 px-4">Your visibility execution photo and data have been safely synced.</p>
                    <button 
                      onClick={handleNewEntry}
                      className="w-full py-4 rounded-xl text-white font-bold text-lg bg-red-600 shadow-lg shadow-red-200 hover:bg-red-700 hover:-translate-y-0.5 transition-all active:translate-y-0 active:shadow-md"
                    >
                      Make New Entry
                    </button>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit} className="space-y-6 animate-fade-in">
                    <div>
                      <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                        <User className="w-3.5 h-3.5 mr-1.5 text-slate-400" /> Step 1: Outlet Details
                      </h3>
                      <div className="space-y-3 bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm">
                        
                        <div className="space-y-1">
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Merchandiser Name</label>
                           <select className="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-red-100 transition-all font-medium text-slate-700" value={merchandiser} onChange={(e) => { setMerchandiser(e.target.value); setVisitDay(''); setAccountName(''); setRoute(''); setOutletCode(''); }} required>
                             <option value="">Select Merchandiser</option>
                             {merchandisers.length === 0 && <option disabled>⚠️ No Merchandisers Found</option>}
                             {merchandisers.map(m => <option key={m} value={m}>{m}</option>)}
                           </select>
                        </div>

                        <div className="space-y-1">
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Visit Day</label>
                           <select className="w-full p-3 bg-white border border-slate-300 rounded-xl disabled:opacity-50 outline-none focus:ring-2 focus:ring-red-100 transition-all font-medium text-slate-700" value={visitDay} onChange={(e) => { setVisitDay(e.target.value); setAccountName(''); setRoute(''); setOutletCode(''); }} disabled={!merchandiser} required>
                             <option value="">Select Visit Day</option>
                             {visitDays.map(v => <option key={v} value={v}>{v}</option>)}
                           </select>
                        </div>

                        <div className="space-y-1">
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Account Name</label>
                           <select className="w-full p-3 bg-white border border-slate-300 rounded-xl disabled:opacity-50 outline-none focus:ring-2 focus:ring-red-100 transition-all font-medium text-slate-700" value={accountName} onChange={(e) => { setAccountName(e.target.value); setRoute(''); setOutletCode(''); }} disabled={!visitDay} required>
                             <option value="">Select Account</option>
                             {accounts.map(a => <option key={a} value={a}>{a}</option>)}
                           </select>
                        </div>

                        <div className="space-y-1">
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Route Name</label>
                           <select className="w-full p-3 bg-white border border-slate-300 rounded-xl disabled:opacity-50 outline-none focus:ring-2 focus:ring-red-100 transition-all font-medium text-slate-700" value={route} onChange={(e) => { setRoute(e.target.value); setOutletCode(''); }} disabled={!accountName} required>
                             <option value="">Select Route</option>
                             {routes.map(r => <option key={r} value={r}>{r}</option>)}
                           </select>
                        </div>

                        <div className="space-y-1">
                           <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Outlet Name</label>
                           <select className="w-full p-3 bg-white border border-slate-300 rounded-xl disabled:opacity-50 outline-none focus:ring-2 focus:ring-red-100 transition-all font-bold text-slate-800" value={outletCode} onChange={(e) => setOutletCode(e.target.value)} disabled={!route} required>
                             <option value="">Select Outlet</option>
                             {outlets.map(o => <option key={o.outletCode} value={o.outletCode}>{o.outletName}</option>)}
                           </select>
                        </div>

                        {selectedOutletDetails && (
                           <div className="grid grid-cols-2 gap-3 mt-4 pt-3 border-t border-slate-200 animate-in fade-in">
                              <div className="space-y-1">
                                 <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Outlet Code</label>
                                 <input type="text" readOnly value={selectedOutletDetails.outletCode} className="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl text-xs font-bold text-slate-500 outline-none" />
                              </div>
                              <div className="space-y-1">
                                 <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Territory Name</label>
                                 <input type="text" readOnly value={selectedOutletDetails.territoryName} className="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-xl text-xs font-bold text-slate-500 outline-none" />
                              </div>
                           </div>
                        )}
                      </div>
                    </div>
                  
                    <div>
                      <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                        <Package className="w-3.5 h-3.5 mr-1.5 text-slate-400" /> Step 2: Shelf Share
                      </h3>
                      <div className="flex space-x-3 bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm">
                         <div className="flex-1">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Total Category</label>
                            <input type="number" min="0" required className="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-red-100 transition-all font-bold text-slate-700" placeholder="e.g. 10" value={totalShelf} onChange={e => setTotalShelf(e.target.value)} />
                         </div>
                         <div className="flex-1">
                            <label className="block text-[10px] font-bold text-red-500 mb-1 uppercase tracking-wider">Colgate Shelves</label>
                            <input type="number" min="0" required className="w-full p-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-red-100 transition-all font-bold text-red-600" placeholder="e.g. 4" value={colgateShelf} onChange={e => setColgateShelf(e.target.value)} />
                         </div>
                      </div>
                    </div>

                    <div>
                      <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                        <Camera className="w-3.5 h-3.5 mr-1.5 text-slate-400" /> Step 3: Execution Photo
                      </h3>
                      <div className="relative border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50 h-32 flex justify-center items-center overflow-hidden hover:bg-slate-100 transition-colors group shadow-sm">
                        {preview ? (
                          <>
                            <img src={preview} className="w-full h-full object-cover" alt="Preview" />
                            <button 
                              onClick={clearImage} 
                              className="absolute top-2 right-2 p-1.5 bg-black/60 backdrop-blur-sm text-white rounded-full hover:bg-red-600 transition-all z-10 shadow-sm"
                            >
                              <X className="h-4 w-4" />
                            </button>
                          </>
                        ) : (
                          <>
                            <div className="flex flex-col items-center justify-center space-y-2">
                              <div className="p-3 bg-white rounded-full shadow-sm border border-slate-100">
                                 <Camera className="h-6 w-6 text-red-600" />
                              </div>
                              <span className="font-bold text-slate-500 text-sm">Snap Execution</span>
                            </div>
                            <input id="camera-input" type="file" accept="image/*" capture="environment" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer z-0" required />
                          </>
                        )}
                      </div>
                    </div>

                    <button type="submit" disabled={isUploading} className="w-full py-4 rounded-xl text-white font-bold text-lg bg-red-600 shadow-lg shadow-red-200 hover:bg-red-700 hover:shadow-xl hover:-translate-y-0.5 transition-all active:translate-y-0 active:shadow-md">{isUploading ? 'Syncing...' : 'Submit Execution'}</button>
                  </form>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // AUDITOR DASHBOARD 
        // ==========================================
        function DashboardApp({ outletMaster }) {
          const [visits, setVisits] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [isSalesLoading, setIsSalesLoading] = useState(true);
          const [searchTerm, setSearchTerm] = useState('');
          
          // SET DEFAULT VIEW TO TODAY
          const [filterDate, setFilterDate] = useState(getLocalTodayString()); 
          const [filterMerchandiser, setFilterMerchandiser] = useState('All');
          const [filterTerritory, setFilterTerritory] = useState('All');
          const [filterRoute, setFilterRoute] = useState('All');
          const [filterAccount, setFilterAccount] = useState('All');
          const [filterOutlet, setFilterOutlet] = useState('All');
          const [filterStatus, setFilterStatus] = useState('All');
          const [previewPhoto, setPreviewPhoto] = useState(null);
          
          // Sales State
          const [outletGrowth, setOutletGrowth] = useState({});
          const [salesError, setSalesError] = useState('');

          const dashboardMerchandisers = useMemo(() => [...new Set(outletMaster.map(o => o.merchandiserName?.trim()).filter(Boolean))].sort(), [outletMaster]);
          const dashboardTerritories = useMemo(() => [...new Set(outletMaster.map(o => o.territoryName?.trim()).filter(Boolean))].sort(), [outletMaster]);
          const dashboardRoutes = useMemo(() => filterTerritory !== 'All' ? [...new Set(outletMaster.filter(o => o.territoryName?.trim() === filterTerritory).map(o => o.routeName?.trim()).filter(Boolean))].sort() : [], [filterTerritory, outletMaster]);
          const dashboardAccounts = useMemo(() => filterRoute !== 'All' ? [...new Set(outletMaster.filter(o => o.routeName?.trim() === filterRoute).map(o => o.accountName?.trim()).filter(Boolean))].sort() : [], [filterRoute, outletMaster]);
          const dashboardOutlets = useMemo(() => filterAccount !== 'All' ? outletMaster.filter(o => o.accountName?.trim() === filterAccount && o.routeName?.trim() === filterRoute) : [], [filterAccount, filterRoute, outletMaster]);

          // --- FETCH VISITS ---
          useEffect(() => {
            const fetchFromSheets = async () => {
              try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                setVisits(data);
              } catch (err) {
                console.error("Failed to fetch from Google Sheets:", err);
              } finally {
                setIsLoading(false);
              }
            };
            fetchFromSheets();
          }, []);

          // --- FETCH & CALCULATE SALES DATA ---
          useEffect(() => {
            const fetchSalesData = async () => {
              try {
                const csvText = await fetchCSVData(SALES_CSV_URL);
                
                const lines = csvText.split(/\r?\n/).filter(line => line.trim().length > 0);
                if (lines.length < 2) return;

                // Support for short month names like "Jan", "Feb", "Mar"
                const monthNames = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
                
                // --- 1. FIND THE LATEST MONTH AND YEAR IN THE DATASET ---
                const parsedRows = [];
                let latestYear = 0;
                let latestMonthIndex = -1;

                for (let i = 1; i < lines.length; i++) {
                  const row = parseCSVLine(lines[i]);
                  parsedRows.push(row);
                  
                  if (row.length > 14) {
                    const y = parseInt(row[5], 10); // Column F: YEAR
                    // Extract first 3 letters safely and make lowercase to match our array
                    const mName = row[14] ? row[14].trim().toLowerCase().substring(0, 3) : ""; 
                    const mIdx = monthNames.indexOf(mName);
                    
                    if (!isNaN(y) && mIdx !== -1) {
                      if (y > latestYear) {
                        latestYear = y;
                        latestMonthIndex = mIdx;
                      } else if (y === latestYear && mIdx > latestMonthIndex) {
                        latestMonthIndex = mIdx;
                      }
                    }
                  }
                }

                // Fallback just in case data is empty or malformed
                if (latestYear === 0) {
                  const now = new Date();
                  latestYear = now.getFullYear();
                  latestMonthIndex = now.getMonth();
                }

                // --- 2. SET PERIODS BASED ON THE LATEST AVAILABLE DATA ---
                const currentYear = latestYear;
                const currentMonthIndex = latestMonthIndex;
                const currentMonthName = monthNames[currentMonthIndex];
                
                // Handle rolling backward to December if current is January
                let prevMonthIndex = currentMonthIndex - 1;
                let prevMonthYear = currentYear;
                if (prevMonthIndex < 0) {
                  prevMonthIndex = 11;
                  prevMonthYear = currentYear - 1;
                }
                const prevMonthName = monthNames[prevMonthIndex];
                
                // Array of months up to the current latest month (e.g., ["jan", "feb", "mar"])
                const ytdMonths = monthNames.slice(0, currentMonthIndex + 1);

                const salesAgg = {};

                // --- 3. AGGREGATE SALES EXACTLY AS REQUESTED ---
                for (let i = 0; i < parsedRows.length; i++) {
                  const row = parsedRows[i];
                  if (row.length > 14) {
                    const code = row[1]?.trim(); // Column B: CODE
                    const year = parseInt(row[5], 10); // Column F: YEAR
                    const sales = parseFloat((row[13] || "").replace(/,/g, '')) || 0; // Column N: ACTUAL SALES
                    const monthName = row[14] ? row[14].trim().toLowerCase().substring(0, 3) : ""; // Column O: MONTH NAME

                    if (code && !isNaN(year) && sales !== 0) {
                      if (!salesAgg[code]) salesAgg[code] = { currentMonth: 0, prevMonth: 0, ytdCurrent: 0, ytdPrev: 0 };
                      
                      // MoM Accumulation
                      if (year === currentYear && monthName === currentMonthName) salesAgg[code].currentMonth += sales;
                      if (year === prevMonthYear && monthName === prevMonthName) salesAgg[code].prevMonth += sales;

                      // YTD Accumulation
                      if (ytdMonths.includes(monthName)) {
                        if (year === currentYear) salesAgg[code].ytdCurrent += sales; // Current Year (e.g. 2026 Jan to Mar)
                        if (year === currentYear - 1) salesAgg[code].ytdPrev += sales; // Previous Year (e.g. 2025 Jan to Mar)
                      }
                    }
                  }
                }

                // --- 4. CALCULATE GROWTH WITH (CURRENT / PREV) - 1 ---
                const growthMap = {};
                Object.keys(salesAgg).forEach(code => {
                   const data = salesAgg[code];
                   
                   // (Current / Previous) - 1
                   const mom = data.prevMonth ? ((data.currentMonth / data.prevMonth) - 1) * 100 : (data.currentMonth > 0 ? 100 : 0);
                   const ytd = data.ytdPrev ? ((data.ytdCurrent / data.ytdPrev) - 1) * 100 : (data.ytdCurrent > 0 ? 100 : 0);
                   
                   growthMap[code] = { mom, ytd };
                });

                setOutletGrowth(growthMap);
              } catch (error) {
                console.error("Failed to fetch Sales Data:", error);
                setSalesError(error.message);
              } finally {
                setIsSalesLoading(false);
              }
            };
            fetchSalesData();
          }, []);

          const currentHierarchyCodes = useMemo(() => {
            let list = outletMaster;
            if (filterMerchandiser !== 'All') list = list.filter(o => o.merchandiserName?.trim() === filterMerchandiser);
            if (filterTerritory !== 'All') list = list.filter(o => o.territoryName?.trim() === filterTerritory);
            if (filterRoute !== 'All') list = list.filter(o => o.routeName?.trim() === filterRoute);
            if (filterAccount !== 'All') list = list.filter(o => o.accountName?.trim() === filterAccount);
            if (filterOutlet !== 'All') list = list.filter(o => String(o.outletCode)?.trim() === filterOutlet);
            return list.map(o => String(o.outletCode));
          }, [filterMerchandiser, filterTerritory, filterRoute, filterAccount, filterOutlet, outletMaster]);

          const hierarchyFilteredData = useMemo(() => {
            let filtered = visits.map(v => {
              let finalTimestamp = v.timestamp;

              if (v.dateString) {
                let backupDate = new Date(v.dateString);
                if (isNaN(backupDate.getTime()) && String(v.dateString).includes('/')) {
                   const parts = String(v.dateString).split('/');
                   if (parts.length === 3) {
                     let m = parseInt(parts[0], 10);
                     let d = parseInt(parts[1], 10);
                     if (m > 12) { const tmp = m; m = d; d = tmp; }
                     backupDate = new Date(`${parts[2]}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}T00:00:00`);
                   }
                }
                if (!isNaN(backupDate.getTime())) {
                  const dayDiff = Math.abs(finalTimestamp - backupDate.getTime()) / 86400000;
                  if (dayDiff > 1) finalTimestamp = backupDate.getTime();
                }
              }

              const d = new Date(finalTimestamp);
              const localDateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
              
              let s = (v.status || 'Pending Audit').trim();
              if (s === 'Compliant' || s === 'Passed') s = 'Planogram Compliant';
              if (s === 'Need Intervention' || s === 'Failed') s = 'Non Compliant';

              return {
                ...v,
                status: s, 
                merchandiserName: (v.merchandiserName || '').trim(),
                derivedDateString: localDateStr,
                timestamp: finalTimestamp 
              };
            });

            if (filterMerchandiser !== 'All') filtered = filtered.filter(v => v.merchandiserName === filterMerchandiser);
            if (filterTerritory !== 'All') filtered = filtered.filter(v => v.territoryName?.trim() === filterTerritory);
            if (filterRoute !== 'All') filtered = filtered.filter(v => v.routeName?.trim() === filterRoute);
            if (filterAccount !== 'All') filtered = filtered.filter(v => v.accountName?.trim() === filterAccount);
            if (filterOutlet !== 'All') filtered = filtered.filter(v => String(v.outletCode)?.trim() === filterOutlet);
            
            if (searchTerm.trim()) {
              const lowerSearch = searchTerm.toLowerCase();
              filtered = filtered.filter(v => 
                (v.outletName && String(v.outletName).toLowerCase().includes(lowerSearch)) || 
                (v.outletCode && String(v.outletCode).toLowerCase().includes(lowerSearch)) ||
                (v.merchandiserName && String(v.merchandiserName).toLowerCase().includes(lowerSearch))
              );
            }
            return filtered;
          }, [visits, filterMerchandiser, filterTerritory, filterRoute, filterAccount, filterOutlet, searchTerm]);

          const dateFilteredData = useMemo(() => {
            if (!filterDate) return hierarchyFilteredData;
            return hierarchyFilteredData.filter(v => v.derivedDateString === filterDate);
          }, [hierarchyFilteredData, filterDate]);

          const tabsCounts = useMemo(() => {
            const todayStr = getLocalTodayString();
            const counts = {
              'AllHistory': hierarchyFilteredData.length,
              'Today': hierarchyFilteredData.filter(v => v.derivedDateString === todayStr).length,
              'Pending Audit': 0,
              'Planogram Compliant': 0,
              'Improvement Outlet': 0,
              'Non Compliant': 0
            };
            
            dateFilteredData.forEach(v => {
              if (counts[v.status] !== undefined) counts[v.status]++;
            });
            return counts;
          }, [hierarchyFilteredData, dateFilteredData]);

          const tableData = useMemo(() => {
            let finalData = dateFilteredData;
            if (filterStatus !== 'All') finalData = finalData.filter(v => v.status === filterStatus);
            
            return finalData.sort((a, b) => b.timestamp - a.timestamp).map(v => {
              const growth = outletGrowth[String(v.outletCode)] || { mom: 0, ytd: 0 };
              
              return {
                ...v,
                momGrowth: (isNaN(growth.mom) || !isFinite(growth.mom)) ? 0 : growth.mom.toFixed(1), 
                ytdGrowth: (isNaN(growth.ytd) || !isFinite(growth.ytd)) ? 0 : growth.ytd.toFixed(1)
              };
            });
          }, [dateFilteredData, filterStatus, outletGrowth]);

          const updateAuditStatus = async (id, status, visitData) => {
            try {
              setVisits(prevVisits => prevVisits.map(v => v.id === id ? { ...v, status } : v));
              if (visitData) {
                await fetch(GOOGLE_SCRIPT_URL, {
                  method: 'POST',
                  mode: 'no-cors',
                  redirect: 'follow',
                  headers: { 'Content-Type': 'text/plain' },
                  body: JSON.stringify({
                    action: 'updateStatus',
                    outletCode: String(visitData.outletCode),
                    merchandiserName: visitData.merchandiserName,
                    status: status
                  })
                });
              }
            } catch (err) { console.error(err); }
          };

          const getStatusBadge = (status) => {
            if(status === 'Planogram Compliant') return <span className="px-2 py-0.5 text-[10px] font-bold uppercase bg-green-500 text-white rounded">Planogram Compliant</span>;
            if(status === 'Improvement Outlet') return <span className="px-2 py-0.5 text-[10px] font-bold uppercase bg-yellow-400 text-yellow-900 rounded">Improvement</span>;
            if(status === 'Non Compliant') return <span className="px-2 py-0.5 text-[10px] font-bold uppercase bg-red-600 text-white rounded">Non Compliant</span>;
            return <span className="px-2 py-0.5 text-[10px] font-bold uppercase bg-slate-200 text-slate-600 rounded">Pending Audit</span>;
          };

          const renderGrowth = (val) => {
            if (val === undefined || val === null || val === '') return <span className="text-slate-300">-</span>;
            const num = parseFloat(val);
            if (isNaN(num)) return <span className="text-slate-500 text-xs font-bold">{val}</span>;
            if (num > 0) return <span className="text-green-600 bg-green-50 px-2 py-0.5 rounded border border-green-100 text-[11px] font-bold inline-flex items-center"><TrendingUp className="w-3 h-3 mr-1" />+{num}%</span>;
            if (num < 0) return <span className="text-red-600 bg-red-50 px-2 py-0.5 rounded border border-red-100 text-[11px] font-bold inline-flex items-center"><TrendingDown className="w-3 h-3 mr-1" />{num}%</span>;
            return <span className="text-slate-500 bg-slate-50 px-2 py-0.5 rounded border border-slate-200 text-[11px] font-bold inline-flex items-center">0%</span>;
          };

          const kpiVisits = useMemo(() => {
            return visits
              .map(v => {
                 let s = (v.status || 'Pending Audit').trim();
                 if(s === 'Compliant' || s === 'Passed') s = 'Planogram Compliant';
                 if(s === 'Need Intervention' || s === 'Failed') s = 'Non Compliant';
                 return {...v, status: s};
              })
              .filter(v => currentHierarchyCodes.includes(String(v.outletCode)));
          }, [visits, currentHierarchyCodes]);

          const stats = useMemo(() => {
            const covered = new Set(kpiVisits.map(v => String(v.outletCode))).size;
            const audited = kpiVisits.filter(v => v.status !== 'Pending Audit').length;
            const passed = kpiVisits.filter(v => v.status === 'Planogram Compliant').length;
            return {
              coverage: covered,
              totalOutlets: currentHierarchyCodes.length,
              audited,
              totalVisits: kpiVisits.length,
              passRate: audited > 0 ? Math.round((passed/audited)*100) : 0
            };
          }, [kpiVisits, currentHierarchyCodes]);

          const handleExport = () => {
            const headers = ['Date', 'Time', 'Account Name', 'Outlet Code', 'Outlet Name', 'Territory Name', 'Route Name', 'Visit Day', 'Merchandiser Name', 'Total Shelves', 'Colgate Shelves', 'Share of Shelf %', 'Status', 'Image Link'];

            const csvContent = [
              headers.join(','),
              ...tableData.map(v => {
                const d = new Date(v.timestamp);
                return [
                  `"${d.toLocaleDateString()}"`,
                  `"${d.toLocaleTimeString()}"`,
                  `"${v.accountName || ''}"`,
                  `"${v.outletCode || ''}"`,
                  `"${v.outletName || ''}"`,
                  `"${v.territoryName || ''}"`,
                  `"${v.routeName || ''}"`,
                  `"${v.visitDay || ''}"`,
                  `"${v.merchandiserName || ''}"`,
                  `"${v.totalShelf !== undefined ? v.totalShelf : ''}"`,
                  `"${v.colgateShelf !== undefined ? v.colgateShelf : ''}"`,
                  `"${v.totalShelf ? Math.round((v.colgateShelf / v.totalShelf) * 100) + '%' : '0%'}"`,
                  `"${v.status || ''}"`,
                  `"${v.imageUrl || ''}"`
                ].join(',');
              })
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `MT_Audit_Report.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          if (isLoading || isSalesLoading) {
            return (
              <div className="flex flex-col items-center justify-center min-h-[70vh] w-full">
                 <Loader2 className="h-12 w-12 text-red-600 animate-spin mb-4" />
                 <h3 className="text-slate-600 font-bold text-lg">Loading Dashboard Data...</h3>
                 <p className="text-slate-400 font-medium text-sm mt-1">Fetching live data from Google Sheets</p>
              </div>
            );
          }

          if (salesError) {
             console.warn("Sales module failed to load. Will continue without MoM/YTD data.", salesError);
          }

          // Variables to determine which UI tab is active
          const isToday = filterDate === getLocalTodayString();
          const isAllHistory = filterDate === '';

          return (
            <div className="max-w-7xl mx-auto p-3 sm:p-6 space-y-4">
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div className="bg-white rounded-xl p-3 border border-slate-200 shadow-sm flex justify-between items-center">
                   <div className="flex items-center gap-3">
                     <div className="p-2 bg-blue-50 text-blue-600 rounded-lg"><Store className="h-5 w-5" /></div>
                     <div>
                       <p className="text-slate-400 font-bold text-[10px] uppercase tracking-wider">Coverage</p>
                       <h3 className="text-xl font-black text-slate-800 leading-none mt-0.5">{stats.coverage} <span className="text-sm text-slate-400 font-bold">/ {stats.totalOutlets}</span></h3>
                     </div>
                   </div>
                   <span className="text-[10px] font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-md">{Math.round((stats.coverage/(stats.totalOutlets || 1))*100)}%</span>
                </div>

                <div className="bg-white rounded-xl p-3 border border-slate-200 shadow-sm flex justify-between items-center">
                   <div className="flex items-center gap-3">
                     <div className="p-2 bg-amber-50 text-amber-600 rounded-lg"><ClipboardCheck className="h-5 w-5" /></div>
                     <div>
                       <p className="text-slate-400 font-bold text-[10px] uppercase tracking-wider">Audited</p>
                       <h3 className="text-xl font-black text-slate-800 leading-none mt-0.5">{stats.audited} <span className="text-sm text-slate-400 font-bold">/ {stats.totalVisits}</span></h3>
                     </div>
                   </div>
                   <span className="text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded-md">{stats.totalVisits - stats.audited} left</span>
                </div>

                <div className="bg-white rounded-xl p-3 border border-slate-200 shadow-sm flex justify-between items-center">
                   <div className="flex items-center gap-3">
                     <div className="p-2 bg-green-50 text-green-600 rounded-lg"><Target className="h-5 w-5" /></div>
                     <div>
                       <p className="text-slate-400 font-bold text-[10px] uppercase tracking-wider">Compliance</p>
                       <h3 className="text-xl font-black text-slate-800 leading-none mt-0.5">{stats.passRate}%</h3>
                     </div>
                   </div>
                   <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${stats.passRate > 80 ? 'bg-green-100 text-green-700' : stats.passRate > 50 ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}>
                     {stats.passRate > 80 ? 'Excellent' : stats.passRate > 50 ? 'Good' : 'Review'}
                   </span>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex flex-col gap-3">
                <div className="flex flex-col sm:flex-row gap-2 items-center">
                   <div className="w-full sm:w-auto bg-slate-100 px-3 py-1.5 rounded-lg flex items-center shrink-0">
                     <Filter className="h-3.5 w-3.5 mr-1.5 text-red-600" />
                     <span className="text-xs font-bold text-slate-700">Filters</span>
                   </div>
                   <div className="relative w-full sm:w-40">
                      <CalendarDays className="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-400" />
                      <input type="date" className="w-full pl-8 pr-2 py-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-bold outline-none focus:border-red-300 transition-all" value={filterDate} onChange={e => { setFilterDate(e.target.value); setFilterStatus('All'); }} />
                   </div>
                   <div className="relative flex-1 w-full">
                      <Search className="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-400" />
                      <input type="text" placeholder="Search by Outlet Name, Code, or Merchandiser..." className="w-full pl-8 pr-3 py-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs outline-none focus:border-red-300 transition-all" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                   </div>
                   <button onClick={handleExport} className="w-full sm:w-auto bg-slate-800 text-white px-4 py-1.5 rounded-lg text-xs font-bold flex items-center justify-center hover:bg-slate-900 transition-all">
                      <Download className="h-3.5 w-3.5 mr-1.5" /> Export
                   </button>
                </div>

                <div className="grid grid-cols-2 lg:grid-cols-5 gap-2">
                  <select className="w-full p-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-semibold text-slate-600 outline-none focus:border-red-300 transition-all appearance-none cursor-pointer" value={filterMerchandiser} onChange={e => setFilterMerchandiser(e.target.value)}>
                    <option value="All">All Merchandisers</option>
                    {dashboardMerchandisers.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                  <select className="w-full p-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-semibold text-slate-600 outline-none focus:border-red-300 transition-all appearance-none cursor-pointer" value={filterTerritory} onChange={e => { setFilterTerritory(e.target.value); setFilterRoute('All'); setFilterAccount('All'); setFilterOutlet('All'); }}>
                    <option value="All">All Territories</option>
                    {dashboardTerritories.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <select className="w-full p-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-semibold text-slate-600 outline-none focus:border-red-300 transition-all disabled:opacity-50 appearance-none cursor-pointer" value={filterRoute} onChange={e => { setFilterRoute(e.target.value); setFilterAccount('All'); setFilterOutlet('All'); }} disabled={filterTerritory === 'All'}>
                    <option value="All">All Routes</option>
                    {dashboardRoutes.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                  <select className="w-full p-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-semibold text-slate-600 outline-none focus:border-red-300 transition-all disabled:opacity-50 appearance-none cursor-pointer" value={filterAccount} onChange={e => { setFilterAccount(e.target.value); setFilterOutlet('All'); }} disabled={filterRoute === 'All'}>
                    <option value="All">All Accounts</option>
                    {dashboardAccounts.map(a => <option key={a} value={a}>{a}</option>)}
                  </select>
                  <select className="w-full p-1.5 bg-slate-50 border border-slate-200 hover:bg-white rounded-lg text-xs font-semibold text-slate-600 outline-none focus:border-red-300 transition-all disabled:opacity-50 appearance-none cursor-pointer" value={filterOutlet} onChange={e => setFilterOutlet(e.target.value)} disabled={filterAccount === 'All'}>
                    <option value="All">All Outlets</option>
                    {dashboardOutlets.map(o => <option key={o.outletCode} value={o.outletCode}>{o.outletCode ? `[${o.outletCode}] ` : ''}{o.outletName}</option>)}
                  </select>
                </div>
              </div>

              <div className="flex flex-wrap gap-2 items-center">
                 <button onClick={() => { setFilterDate(''); setFilterStatus('All'); }} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${isAllHistory && filterStatus === 'All' ? 'bg-slate-800 text-white' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>All History ({tabsCounts['AllHistory']})</button>
                 <button onClick={() => { setFilterDate(getLocalTodayString()); setFilterStatus('All'); }} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${isToday && filterStatus === 'All' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border border-slate-200 hover:bg-blue-50 hover:text-blue-600'}`}>Today's ({tabsCounts['Today']})</button>
                 
                 <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>

                 <button onClick={() => setFilterStatus('Pending Audit')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${filterStatus === 'Pending Audit' ? 'bg-slate-200 text-slate-700 border-slate-300' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}>Pending ({tabsCounts['Pending Audit']})</button>
                 <button onClick={() => setFilterStatus('Planogram Compliant')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${filterStatus === 'Planogram Compliant' ? 'bg-green-500 text-white border-green-500' : 'bg-white text-slate-500 border border-slate-200 hover:bg-green-50 hover:text-green-600'}`}>Planogram Compliant ({tabsCounts['Planogram Compliant']})</button>
                 <button onClick={() => setFilterStatus('Improvement Outlet')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${filterStatus === 'Improvement Outlet' ? 'bg-yellow-400 text-yellow-900 border-yellow-400' : 'bg-white text-slate-500 border border-slate-200 hover:bg-yellow-50 hover:text-yellow-700'}`}>Improvement ({tabsCounts['Improvement Outlet']})</button>
                 <button onClick={() => setFilterStatus('Non Compliant')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm ${filterStatus === 'Non Compliant' ? 'bg-red-600 text-white border-red-600' : 'bg-white text-slate-500 border border-slate-200 hover:bg-red-50 hover:text-red-600'}`}>Non Compliant ({tabsCounts['Non Compliant']})</button>
              </div>

              {tableData.length === 0 ? (
                <div className="flex flex-col items-center justify-center min-h-[50vh] text-center bg-white rounded-3xl border border-slate-200 shadow-sm w-full">
                   <Search className="h-16 w-16 text-slate-200 mb-4" />
                   <h3 className="text-slate-600 font-black text-lg">No executions found</h3>
                   <p className="text-slate-400 font-medium text-sm mt-1">Try adjusting your filters to see more data.</p>
                </div>
              ) : (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse whitespace-nowrap">
                      <thead>
                        <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] uppercase tracking-widest">
                          <th className="p-4 font-bold w-20">Photo</th>
                          <th className="p-4 font-bold">Outlet Details</th>
                          <th className="p-4 font-bold">Merchandiser & Time</th>
                          <th className="p-4 font-bold text-center">SOS %</th>
                          <th className="p-4 font-bold text-center">MoM Grw</th>
                          <th className="p-4 font-bold text-center">YTD Grw</th>
                          <th className="p-4 font-bold">Status</th>
                          <th className="p-4 font-bold text-right pr-6">Audit Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {tableData.map(p => (
                          <tr key={p.id} className="hover:bg-slate-50/80 transition-colors group">
                            <td className="p-4">
                              <div 
                                className="w-16 h-16 rounded-xl overflow-hidden cursor-pointer border border-slate-200 shadow-sm relative"
                                onClick={() => setPreviewPhoto(p)}
                              >
                                <img src={getDirectImageUrl(p.imageUrl)} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" alt="Thumbnail" />
                                <div className="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/20 transition-colors flex items-center justify-center">
                                   <Maximize2 className="text-white w-5 h-5 opacity-0 group-hover:opacity-100 drop-shadow-md" />
                                </div>
                              </div>
                            </td>
                            <td className="p-4">
                              <p className="text-sm font-black text-slate-800 truncate max-w-[200px] sm:max-w-xs">{p.outletName}</p>
                              <p className="text-xs text-slate-500 font-medium mt-0.5">{p.accountName} • <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-bold">{p.outletCode}</span></p>
                            </td>
                            <td className="p-4">
                              <p className="text-sm font-bold text-slate-700 flex items-center"><User className="w-3.5 h-3.5 mr-1.5 text-slate-400" />{p.merchandiserName}</p>
                              <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 flex items-center"><Clock className="w-3 h-3 mr-1" />{new Date(p.timestamp).toLocaleDateString()} {new Date(p.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                            </td>
                            <td className="p-4 text-center">
                              {(p.totalShelf !== undefined && p.totalShelf > 0) ? (
                                <div className="inline-flex flex-col items-center">
                                  <span className="text-xs font-black text-red-600 bg-red-50 px-2 py-0.5 rounded-md border border-red-100">
                                    {Math.round((p.colgateShelf / p.totalShelf) * 100)}%
                                  </span>
                                  <span className="text-[9px] text-slate-400 font-medium mt-0.5">{p.colgateShelf}/{p.totalShelf}</span>
                                </div>
                              ) : (
                                <span className="text-slate-300">-</span>
                              )}
                            </td>
                            <td className="p-4 text-center">
                              {renderGrowth(p.momGrowth)}
                            </td>
                            <td className="p-4 text-center">
                              {renderGrowth(p.ytdGrowth)}
                            </td>
                            <td className="p-4">
                              {getStatusBadge(p.status)}
                            </td>
                            <td className="p-4 text-right pr-6">
                              <div className="flex justify-end space-x-2">
                                 <button 
                                   onClick={() => updateAuditStatus(p.id, 'Planogram Compliant', p)} 
                                   title="Planogram Compliant"
                                   className={`p-2 rounded-xl transition-all ${p.status === 'Planogram Compliant' ? 'bg-green-500 text-white shadow-md shadow-green-200' : 'bg-white border border-slate-200 text-slate-400 hover:bg-green-50 hover:text-green-600 hover:border-green-200'}`}
                                 >
                                   <Check className="h-4 w-4" />
                                 </button>
                                 <button 
                                   onClick={() => updateAuditStatus(p.id, 'Improvement Outlet', p)} 
                                   title="Improvement Outlet"
                                   className={`p-2 rounded-xl transition-all ${p.status === 'Improvement Outlet' ? 'bg-yellow-400 text-yellow-900 shadow-md shadow-yellow-200 border-yellow-400' : 'bg-white border border-slate-200 text-slate-400 hover:bg-yellow-50 hover:text-yellow-600 hover:border-yellow-200'}`}
                                 >
                                   <AlertCircle className="h-4 w-4" />
                                 </button>
                                 <button 
                                   onClick={() => updateAuditStatus(p.id, 'Non Compliant', p)} 
                                   title="Non Compliant"
                                   className={`p-2 rounded-xl transition-all ${p.status === 'Non Compliant' ? 'bg-red-600 text-white shadow-md shadow-red-200' : 'bg-white border border-slate-200 text-slate-400 hover:bg-red-50 hover:text-red-600 hover:border-red-200'}`}
                                 >
                                   <X className="h-4 w-4" />
                                 </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {previewPhoto && (
                <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center z-[100] p-4 sm:p-8" onClick={() => setPreviewPhoto(null)}>
                   <div className="max-w-5xl w-full flex flex-col h-[90vh] shadow-2xl" onClick={e => e.stopPropagation()}>
                      
                      <div className="bg-slate-900 border-b border-white/10 p-5 rounded-t-3xl flex justify-between items-center">
                         <div>
                            <div className="flex items-center gap-2">
                               <h3 className="text-white font-black text-xl">{previewPhoto.outletName}</h3>
                               <span className="bg-white/10 px-2 py-0.5 rounded text-[10px] font-bold text-white border border-white/20">{previewPhoto.outletCode}</span>
                            </div>
                            <p className="text-slate-400 text-xs mt-1 font-medium flex items-center"><MapPin className="w-3 h-3 mr-1"/> {previewPhoto.territoryName} • {previewPhoto.routeName} • {previewPhoto.accountName}</p>
                         </div>
                         <button onClick={() => setPreviewPhoto(null)} className="p-2.5 bg-white/5 hover:bg-white/10 rounded-full text-slate-300 hover:text-white transition-colors"><X className="w-5 h-5" /></button>
                      </div>

                      <div className="flex-1 bg-black/50 overflow-hidden flex items-center justify-center border-x border-white/5 relative">
                         <img src={getDirectImageUrl(previewPhoto.imageUrl)} className="max-h-full max-w-full object-contain" alt="Preview Full" />
                         <div className="absolute top-4 left-4 scale-110 shadow-lg">{getStatusBadge(previewPhoto.status)}</div>
                         
                         {(previewPhoto.totalShelf !== undefined) && (
                           <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-xl text-slate-800 text-xs font-black shadow-lg border border-white/50 flex flex-col items-center">
                             <span className="text-[9px] uppercase text-slate-500 tracking-widest mb-0.5">Share of Shelf</span>
                             <span className="text-red-600 text-lg">{Math.round((previewPhoto.colgateShelf / previewPhoto.totalShelf) * 100)}%</span>
                             <span className="text-[9px] text-slate-400 mt-0.5">{previewPhoto.colgateShelf} / {previewPhoto.totalShelf} Shelves</span>
                           </div>
                         )}

                         <div className="absolute bottom-4 left-4 bg-slate-900/80 backdrop-blur-md px-4 py-2 rounded-xl text-white text-xs font-bold border border-white/10 flex items-center shadow-lg">
                            <Clock className="w-3.5 h-3.5 mr-2 text-slate-400" />
                            {new Date(previewPhoto.timestamp).toLocaleString()}
                         </div>
                      </div>

                      <div className="bg-slate-900 border-t border-white/10 p-5 rounded-b-3xl flex flex-col sm:flex-row justify-between items-center gap-4">
                         <div className="text-slate-400 text-xs font-bold uppercase tracking-widest flex items-center">
                            <Target className="w-4 h-4 mr-2 text-slate-500" /> Audit Decision
                         </div>
                         <div className="flex gap-3 w-full sm:w-auto">
                            <button 
                              onClick={() => { updateAuditStatus(previewPhoto.id, 'Non Compliant', previewPhoto); setPreviewPhoto({...previewPhoto, status: 'Non Compliant'}); }} 
                              className={`flex-1 sm:flex-none flex items-center justify-center px-4 py-3 rounded-xl transition-all font-bold text-sm border ${previewPhoto.status === 'Non Compliant' ? 'bg-red-600 text-white border-red-500 shadow-lg shadow-red-900/50' : 'bg-transparent text-red-400 border-red-500/30 hover:bg-red-500/10'}`}
                            >
                              <XCircle className="w-4 h-4 mr-1.5" /> Non Compliant
                            </button>
                            <button 
                              onClick={() => { updateAuditStatus(previewPhoto.id, 'Improvement Outlet', previewPhoto); setPreviewPhoto({...previewPhoto, status: 'Improvement Outlet'}); }} 
                              className={`flex-1 sm:flex-none flex items-center justify-center px-4 py-3 rounded-xl transition-all font-bold text-sm border ${previewPhoto.status === 'Improvement Outlet' ? 'bg-yellow-400 text-yellow-900 border-yellow-400 shadow-lg shadow-yellow-900/50' : 'bg-transparent text-yellow-500 border-yellow-500/30 hover:bg-yellow-500/10'}`}
                            >
                              <AlertCircle className="w-4 h-4 mr-1.5" /> Improvement
                            </button>
                            <button 
                              onClick={() => { updateAuditStatus(previewPhoto.id, 'Planogram Compliant', previewPhoto); setPreviewPhoto({...previewPhoto, status: 'Planogram Compliant'}); }} 
                              className={`flex-1 sm:flex-none flex items-center justify-center px-4 py-3 rounded-xl transition-all font-bold text-sm border ${previewPhoto.status === 'Planogram Compliant' ? 'bg-green-500 text-white border-green-400 shadow-lg shadow-green-900/50' : 'bg-transparent text-green-400 border-green-500/30 hover:bg-green-500/10'}`}
                            >
                              <CheckCircle className="w-4 h-4 mr-1.5" /> Compliant
                            </button>
                         </div>
                      </div>

                   </div>
                </div>
              )}
            </div>
          );
        }
        // --- YOUR CODE ENDS HERE ---

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
